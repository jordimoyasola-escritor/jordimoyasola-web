# ═══════════════════════════════════════════════════════
# netlify.toml — jordimoyasola.com
# Astro hybrid + @astrojs/netlify adapter + Edge Middleware
# ═══════════════════════════════════════════════════════

[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NODE_ENV     = "production"

# ─── Edge Functions (middleware i18n) ───────────────────
[edge_functions]
  # Astro genera las edge functions automáticamente en dist/_edge/

# ─── Netlify Functions (API routes /api/*) ──────────────
[functions]
  directory    = ".netlify/functions-internal"
  node_bundler = "esbuild"

# ─── Redirects ──────────────────────────────────────────
# www → non-www (Netlify lo gestiona a nivel de dominio,
# pero lo dejamos aquí como fallback)
[[redirects]]
  from   = "https://jordimoyasola.com/*"
  to     = "https://www.jordimoyasola.com/:splat"
  status = 301
  force  = true

# Blog antiguo → Reflexiones
[[redirects]]
  from   = "/blog"
  to     = "/reflexiones"
  status = 301

[[redirects]]
  from   = "/blog/*"
  to     = "/reflexiones/:splat"
  status = 301

# 404 personalizada
[[redirects]]
  from   = "/*"
  to     = "/404"
  status = 404

# ─── Headers de seguridad ────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options              = "DENY"
    X-Content-Type-Options       = "nosniff"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=(), payment=()"
    X-XSS-Protection             = "1; mode=block"
    Strict-Transport-Security    = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy      = "upgrade-insecure-requests"

# Cache muy largo — assets con hash de Astro (inmutables)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imágenes
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fuentes
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# PDF — forzar descarga + cache moderado
[[headers]]
  for = "/*.pdf"
  [headers.values]
    Cache-Control       = "public, max-age=86400"
    Content-Disposition = "attachment"

# API — no cachear nunca
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag  = "noindex"
